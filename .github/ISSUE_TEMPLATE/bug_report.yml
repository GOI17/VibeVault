name: Bug report
description: Report a reproducible bug in VibeVault
title: "fix(scope): short bug summary"
labels:
  - bug
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs status:approved before a PR can be opened
          required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Bug description
      description: Clear and concise description of the bug.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: What happens instead?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Ubuntu
        - Debian
        - Fedora
        - Arch Linux
        - Windows
        - WSL
        - Other
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent / client
      options:
        - OpenCode
        - Claude Code
        - Gemini CLI
        - Cursor
        - Windsurf
        - Codex
        - Other
    validations:
      required: true

  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - zsh
        - bash
        - fish
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste error output, stack traces, or failing command output.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Any screenshots, links, or related details.
