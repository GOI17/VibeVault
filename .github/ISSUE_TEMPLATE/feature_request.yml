name: Feature request
description: Propose an improvement for VibeVault
title: "feat(scope): short feature summary"
labels:
  - enhancement
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs status:approved before a PR can be opened
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem are you trying to solve?
      placeholder: Describe the pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the desired behavior from a user perspective.
      placeholder: Describe what should change.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Scripts
        - Skills
        - Examples
        - Documentation
        - CI/Workflows
        - Mobile App (UI/UX)
        - API/Data Layer
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approach you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, links, screenshots, etc.
